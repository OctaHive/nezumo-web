name: Deploy website

on:
  push:
    tags:
      - "deploy-*"

permissions:
  contents: read

concurrency:
  group: production-deployment
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://nezumo.ru

    steps:
      - name: Check out tagged revision
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check project
        run: bun run check

      - name: Build website
        run: bun run build

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          test -n "$SSH_PRIVATE_KEY"
          test -n "$SSH_KNOWN_HOSTS"
          install -m 700 -d "$HOME/.ssh"
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/id_ed25519" "$HOME/.ssh/known_hosts"

      - name: Publish dist to nginx server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_PORT"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_PATH"

          case "$DEPLOY_PATH" in
            /*) ;;
            *)
              echo "DEPLOY_PATH must be an absolute path."
              exit 1
              ;;
          esac

          if [ "$DEPLOY_PATH" = "/" ]; then
            echo "Refusing to deploy to the server root."
            exit 1
          fi

          rsync \
            --archive \
            --compress \
            --delete \
            --human-readable \
            --itemize-changes \
            -e "ssh -p $DEPLOY_PORT -i $HOME/.ssh/id_ed25519 -o BatchMode=yes" \
            dist/ \
            "$DEPLOY_USER@$DEPLOY_HOST:${DEPLOY_PATH%/}/"
